name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.10, 3.11]

    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov
    
    - name: Lint with ruff
      run: |
        pip install ruff
        ruff check src/ scripts/ demo/ --output-format=github
    
    - name: Format check with black
      run: |
        pip install black
        black --check src/ scripts/ demo/
    
    - name: Run tests
      run: |
        python test_setup.py
    
    - name: Test model creation
      run: |
        python -c "
        import sys
        from pathlib import Path
        sys.path.append(str(Path('src')))
        from models import SceneUnderstandingModel
        from utils import get_device
        model = SceneUnderstandingModel()
        print('Model created successfully')
        "

  build-demo:
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Test demo import
      run: |
        python -c "
        import sys
        from pathlib import Path
        sys.path.append(str(Path('src')))
        from demo.app import SceneUnderstandingDemo
        print('Demo imports successfully')
        "
