# Training configuration
batch_size: 16
learning_rate: 1e-4
weight_decay: 1e-4
num_epochs: 50
warmup_epochs: 5
gradient_clip_norm: 1.0
mixed_precision: true

# Optimizer configuration
optimizer:
  name: "adamw"
  lr: 1e-4
  weight_decay: 1e-4
  betas: [0.9, 0.999]
  eps: 1e-8

# Scheduler configuration
scheduler:
  name: "cosine"
  warmup_epochs: 5
  min_lr: 1e-6

# Early stopping
early_stopping:
  patience: 10
  min_delta: 0.001
  restore_best_weights: true

# Data loading
data_loader:
  batch_size: 16
  num_workers: 4
  pin_memory: true
  shuffle: true
  drop_last: true

# Validation
validation:
  interval: 1
  metrics: ["accuracy", "f1_score", "precision", "recall"]
  save_best: true
  monitor: "val_accuracy"
  mode: "max"
